<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr. Nao - Dermatology Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="main-card">
      <div class="top-bar">
        <h1>Dr. Nao - Dermatology Assistant</h1>
        <div class="icon-btn">⟲</div>
      </div>

      <div class="preview-box">
        <div class="image-side">
          <img src="skinlog.jpg" alt="Skin Lesion" class="skin-img" />
        </div>

        <div class="robot-side">
          <div class="speech-bubble">
            Hello, I'm your virtual assistant.<br />
            Let’s check the skin lesion!
          </div>
          <img src="nao.png" alt="NAO Robot" class="robot-img" />
        </div>
      </div>

      <div class="buttons-area">
        <a href="patient-diagnosis.html" class="main-btn blue-btn">Patient Diagnosis</a>
        <a href="admin-dashboard.html" class="main-btn dark-btn">Admin Login</a>
      </div>

      <div class="note">
        This tool is an aid for medical professionals and not a substitute for a doctor’s diagnosis.
      </div>
    </div>
  </div>
</body>
</html>
